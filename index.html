<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OdontoAi</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
</head>

<section id="loginPage"></section>

<body>
    <div class="container"> <!--Barra Lateral-->
        <aside>
            <div class="top">
                <div class="logo">
                    <img src="./images/OdontoAi_Logo.png">
                    <h2>Odonto<span class="ColorAi">AI</span></h2>
                </div>

                <div class="close" id="close-btn">
                    <span class="material-symbols-outlined">close</span>
                </div>
            </div>

            <div class="sidebar"> <!--Lateral-->
                <a href="#" class="active">
                    <span class="material-symbols-outlined">dashboard</span>
                    <h3>DashBoard</h3>
                </a>

                <a href="#">
                    <span class="material-symbols-outlined">person</span>
                    <h3>Clientes</h3>
                </a>

                <a href="#">
                    <span class="material-symbols-outlined">calendar_month</span>
                    <h3>Agendamentos</h3>
                </a>

                <a href="#">
                    <span class="material-symbols-outlined">chat</span>
                    <h3>Chat</h3>
                    <span class="message-count">13</span>
                </a>

                <a href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <h3>Configurações</h3>
                </a>

                <a href="#">
                    <span class="material-symbols-outlined">logout</span>
                    <h3>Sair</h3>
                </a>
            </div>
        </aside>
        <!--Lateral fim-->
        <main>
            <h1>DashBoard</h1>
            <div class="date">
                <input type="date">
            </div>

            <div class="insights">
                <div class="consultas">
                    <span class="material-symbols-outlined">calendar_check</span>
                    <div class="niddle">
                        <div class="left">
                            <h3>Consultas</h3>            
                        </div>            
                        <div class="progress">
                            <svg>
                                <circle cx="38" cy="38" r="36"></circle>
                            </svg>
                            <div class="number">
                                <p>10</p>
                            </div>
                        </div>
                    </div>
                    <small class="text-muted"> Last 24 Hours</small>     
                </div>
            </div>
        </main>
    </div>
</body>

</html>
